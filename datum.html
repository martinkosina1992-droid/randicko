<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Vyber datum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="center">
    <h1>Vyber datum našeho rande 💌</h1>

    <form action="https://formsubmit.co/martinkosina.1992@gmail.com" method="POST">
      
      <!-- skryté pole s jídlem -->
      <input type="hidden" name="jidlo" id="jidloInput">

      <label>Datum:</label>
      <input type="date" name="datum" required>

      <button type="submit" class="btn yes">Odeslat pozvánku</button>

      <!-- nastavení FormSubmit -->
      <input type="hidden" name="_subject" value="Nové rande!">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
    </form>
  </div>

  <script>
    // získání jídla z URL
    const params = new URLSearchParams(window.location.search);
    const jidlo = params.get("jidlo");
    document.getElementById("jidloInput").value = jidlo;
  </script>
</body>
</html>
