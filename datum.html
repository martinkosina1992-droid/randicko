<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Vyber datum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="center fade">
    <h1>Vyber datum našeho rande 💌</h1>

    <form action="https://formsubmit.co/martinkosina.1992@gmail.com" method="POST">

      <input type="hidden" name="jidlo" id="jidloInput">

      <label>Datum:</label>
      <input type="date" name="datum" required>

      <button type="submit" class="btn yes pulse">Odeslat pozvánku</button>

      <input type="hidden" name="_subject" value="Nové rande!">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="https://martinkosina1992-droid.github.io/randicko/">
    </form>

    <p id="msg">Odesílám… ❤️</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const jidlo = params.get("jidlo");
    document.getElementById("jidloInput").value = jidlo;
  </script>
</body>
</html>
