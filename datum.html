<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Vyber datum</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .fade {
      animation: fadeInPage 0.8s ease forwards;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="center fade">
    <div class="top-heart">💗</div>

    <h1>Vyber datum našeho večera, Míro ✨</h1>
    <p class="subtitle">Ať si to můžu krásně naplánovat jen pro nás dva.</p>

    <form action="https://formsubmit.co/martinkosina.1992@gmail.com" method="POST" onsubmit="handleSubmit()">
      <input type="hidden" name="jidlo" id="jidloInput">

      <input type="date" name="datum" required>

      <br>
      <button type="submit" class="btn yes">Potvrdit datum</button>

      <input type="hidden" name="_subject" value="Nové rande!">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="https://martinkosina1992-droid.github.io/randicko/dekuji.html">
    </form>

    <p class="small">Jakékoliv datum vybereš, už se na něj těším. 💞</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const jidlo = params.get("jidlo");
    document.getElementById("jidloInput").value = jidlo;

    function handleSubmit() {
      document.body.classList.add("fade-out");
    }
  </script>
</body>
</html>
