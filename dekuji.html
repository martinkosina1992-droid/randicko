<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Děkuju ❤️</title>
  <link rel="stylesheet" href="style.css">

  <!-- ✍️ Romantický font, který umí české znaky -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* 🌹 Padající okvětní lístky */
    .petal {
      position: fixed;
      top: -10px;
      font-size: 28px;
      animation: fall 6s linear infinite;
      opacity: 0.9;
      pointer-events: none;
    }

    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    /* ❤️ Animace srdce */
    .heart {
      font-size: 60px;
      animation: heartbeat 1.5s infinite;
      margin-bottom: 20px;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.25); }
      40% { transform: scale(1); }
      60% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* ✨ Fade-in text */
    .fade-text {
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    .fade-text:nth-child(2) { animation-delay: 0.3s; }
    .fade-text:nth-child(3) { animation-delay: 0.8s; }
    .fade-text:nth-child(4) { animation-delay: 1.3s; }
    .fade-text:nth-child(5) { animation-delay: 1.8s; }
    .fade-text:nth-child(6) { animation-delay: 2.3s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ✍️ Animovaný podpis – teď už s českými znaky */
    .signature {
      font-family: 'Dancing Script', cursive;
      font-size: 36px;
      margin-top: 25px;
      opacity: 0;
      animation: signatureFade 2.5s ease forwards;
      animation-delay: 2.5s;
    }

    @keyframes signatureFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- 🌹 Padající okvětní lístky -->
  <div id="petals"></div>

  <div class="center">
    <div class="heart">❤️</div>

    <!-- 💖 Její jméno -->
    <h1 class="fade-text">Míro… miluji tě a těším se…</h1>

    <p class="fade-text">
      Tvoje odpověď mi přišla a mám z toho obrovskou radost.
    </p>

    <p class="fade-text">
      Už se nemůžu dočkat našeho společného rande. ✨
    </p>

    <p class="fade-text">
      Bude to krásný večer, slibuju. 💖
    </p>

    <p class="fade-text" style="font-style: italic; margin-top: 20px;">
      „Láska není o tom najít někoho, s kým budeš žít…  
      ale někoho, bez koho si život nedokážeš představit.“ 💞
    </p>

    <!-- ✍️ Animovaný podpis – už správně -->
    <div class="signature">Tvůj Martin ❤️</div>
  </div>

  <!-- 🎵 Jemná romantická hudba -->
  <audio autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b5e2ad653.mp3?filename=romantic-piano-ambient-110397.mp3" type="audio/mpeg">
  </audio>

  <script>
    /* 🌹 Generování padajících okvětních lístků */
    function createPetal() {
      const petal = document.createElement("div");
      petal.classList.add("petal");
      petal.innerText = "🌹";
      petal.style.left = Math.random() * 100 + "vw";
      petal.style.animationDuration = (4 + Math.random() * 4) + "s";
      document.body.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, 8000);
    }

    setInterval(createPetal, 450);
  </script>
</body>
</html>
